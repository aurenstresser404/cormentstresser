<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CORMENT-C2 • WEBSITE</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1f, #02050c);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 1px, transparent 1px, transparent 4px);
      pointer-events: none;
      z-index: 1;
    }

    .cyber-container {
      max-width: 720px;
      width: 100%;
      background: rgba(6, 12, 24, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      border: 1px solid rgba(0, 255, 255, 0.35);
      box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 255, 0.2);
      padding: 2rem 2rem 2rem 2rem;
      transition: all 0.2s;
      z-index: 10;
    }

    .glitch {
      font-size: 3rem;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
      position: relative;
      text-shadow: 0.05em 0 0 rgba(255,0,100,0.7), -0.05em -0.025em 0 rgba(0,255,255,0.7);
      animation: glitch-shake 0.25s infinite alternate;
      color: #eafbff;
      letter-spacing: 3px;
    }

    .glitch span {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.7;
    }
    .glitch span:first-child {
      animation: glitch-1 2s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(-0.03em, -0.015em);
      color: #ff66cc;
    }
    .glitch span:last-child {
      animation: glitch-2 1.5s infinite;
      clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
      transform: translate(0.02em, 0.02em);
      color: #0ff;
    }

    @keyframes glitch-1 {
      0%,100%{ transform: translate(0); opacity:0.5; }
      20%{ transform: translate(-2px,1px); opacity:0.9; }
      40%{ transform: translate(2px,-1px); opacity:0.6; }
      80%{ transform: translate(1px,2px); opacity:0.8; }
    }
    @keyframes glitch-2 {
      0%,100%{ transform: translate(0); opacity:0.5; }
      25%{ transform: translate(2px,-1px); opacity:0.8; }
      75%{ transform: translate(-1px,2px); opacity:0.7; }
    }
    @keyframes glitch-shake {
      0% { transform: translate(0); }
      100% { transform: translate(-0.6px, 0.4px); }
    }

    .total-visitor-section {
      background: linear-gradient(135deg, rgba(0, 10, 20, 0.85), rgba(0, 30, 45, 0.75));
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      margin: 1.8rem 0 1.2rem;
      text-align: center;
      border: 1px solid #0ff3;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px rgba(0,255,255,0.2);
    }

    .total-label {
      font-size: 0.9rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
      color: #a0f0ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .total-label i { font-size: 1.2rem; color: cyan; }
    .total-number {
      font-size: 4.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #0ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1.1;
      text-shadow: 0 0 8px rgba(0,255,255,0.3);
      margin-top: 0.2rem;
      font-family: monospace;
      letter-spacing: 4px;
    }
    .total-sub { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; }

    .stats-panel {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 26, 36, 0.6);
      border-radius: 60px;
      padding: 0.6rem 1.5rem;
      margin: 1.2rem 0 2rem;
      border: 1px solid cyan;
      backdrop-filter: blur(4px);
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #b3f5ff;
    }
    .stat-item i { font-size: 1.2rem; color: #0ff; }
    .stat-number {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(145deg, #cff, #0ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .social-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.8rem 0 1rem;
    }
    .social-card {
      background: rgba(10, 20, 32, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.2s;
      border: 1px solid rgba(0, 255, 255, 0.35);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .social-card:hover {
      transform: translateY(-3px);
      border-color: #0ff;
      box-shadow: 0 0 15px cyan;
      background: rgba(0, 32, 48, 0.9);
    }
    .social-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .social-left i {
      font-size: 1.8rem;
      width: 2rem;
    }
    .social-left span {
      font-weight: 500;
      font-size: 1.15rem;
      color: #ffffff;
    }
    .arrow-icon {
      opacity: 0.7;
      transition: 0.2s;
      color: #ccc;
    }
    .social-card:hover .arrow-icon {
      opacity: 1;
      transform: translateX(5px);
      color: cyan;
    }
    .card-telegram i { color: #26A5E4; text-shadow:0 0 2px #26A5E4; }
    .card-donasi i { color: #f7b32b; text-shadow:0 0 3px #ffaa33; }

    /* MUSIC PLAYER custom */
    .music-player {
      background: rgba(0, 20, 30, 0.7);
      border-radius: 60px;
      padding: 0.7rem 1.2rem;
      margin: 1rem 0 1.2rem;
      border: 1px solid cyan;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      backdrop-filter: blur(6px);
    }
    .music-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bff;
    }
    .music-info i {
      font-size: 1.7rem;
      color: #ff66cc;
      animation: pulseIcon 1.5s infinite;
    }
    @keyframes pulseIcon {
      0% { text-shadow: 0 0 2px #ff66cc; opacity: 0.7; }
      100% { text-shadow: 0 0 12px #ff66cc; opacity: 1; }
    }
    .music-title {
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    audio {
      background: #0a1f2a;
      border-radius: 40px;
      height: 35px;
      width: 220px;
    }
    audio::-webkit-media-controls-panel {
      background-color: #0a1f2a;
    }
    @media (max-width: 550px) {
      .music-player { flex-direction: column; align-items: stretch; text-align: center; }
      audio { width: 100%; }
    }

    .live-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #6d8fa0;
      border-top: 1px dashed cyan;
      padding-top: 1.2rem;
    }
    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #0f0;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulseAnim 1.2s infinite;
      box-shadow: 0 0 5px #0f0;
    }
    @keyframes pulseAnim { 0% { opacity: 0.4; transform: scale(0.8);} 100% { opacity: 1; transform: scale(1.2);} }

    @media (max-width: 500px) {
      .cyber-container { padding: 1.5rem; }
      .glitch { font-size: 2rem; }
      .total-number { font-size: 2.8rem; }
      .stats-panel { flex-direction: column; align-items: center; gap: 0.4rem; }
      .social-left span { font-size: 0.9rem; }
    }
    .info-badge {
      font-family: monospace;
      background: #0a1c1f30;
      border-radius: 50px;
      padding: 0.2rem 1rem;
      display: inline-block;
      font-size: 0.7rem;
    }
    /* optional: fallback notifikasi jika autoplay terblokir */
    .autoplay-hint {
      text-align: center;
      font-size: 0.7rem;
      color: #ffaa55;
      margin-top: 5px;
      display: none;
    }
  </style>
</head>
<body>
<div class="cyber-container">
  <div class="glitch">
    CORMENT-C2
    <span aria-hidden="true">CORMENT-C2</span>
    <span aria-hidden="true">CORMENT-C2</span>
  </div>
  <div style="text-align: center; margin-top: 6px;">
    <span class="info-badge"><i class="fas fa-shield-haltered"></i> CYBER REALM // DARKNET HUB</span>
  </div>

  <!-- TOTAL PENGUNJUNG -->
  <div class="total-visitor-section">
    <div class="total-label">
      <i class="fas fa-chart-line"></i> TOTAL PENGUNJUNG
      <i class="fas fa-globe"></i>
    </div>
    <div class="total-number" id="totalVisitorDisplay">0</div>
    <div class="total-sub"><i class="fas fa-database"></i> sepanjang waktu • lifetime counter</div>
  </div>

  <!-- stats panel: ONLINE SEKARANG dan STATUS -->
  <div class="stats-panel">
    <div class="stat-item">
      <i class="fas fa-user-astronaut"></i>
      <span>ONLINE SEKARANG</span>
      <span class="stat-number" id="onlineNow">--</span>
    </div>
    <div class="stat-item">
      <i class="fas fa-fingerprint"></i>
      <span>STATUS</span>
      <span style="color:#0f0;">● LIVE</span>
    </div>
  </div>

  <!-- PEMUTAR MUSIK / LAGU dengan autoplay dan loop -->
  <div class="music-player">
    <div class="music-info">
      <i class="fas fa-headphones"></i>
      <span class="music-title">🎧 CORMENT-C2 DJ (KICAW MANIA)</span>
    </div>
    <audio id="bgAudio" controls autoplay loop preload="auto">
      <source src="https://www.image2url.com/r2/default/audio/1777730319208-97623ed6-e299-40f3-aab8-2bac0fa34cfc.m4a" type="audio/mpeg">
      Browser Anda tidak mendukung pemutar audio.
    </audio>
  </div>
  <div id="autoplayHint" class="autoplay-hint"></div>

  <!-- Tautan: telegram, Telegram 1, Telegram 2, Donasi -->
  <div class="social-grid">
    <a href="https://t.me/cormentc2" target="_blank" rel="noopener noreferrer" class="social-card card-telegram">
      <div class="social-left"><i class="fab fa-telegram-plane"></i><span>Telegram Contact</span></div>
      <div class="arrow-icon"><i class="fas fa-arrow-right"></i></div>
    </a>

    <a href="https://t.me/cormentc2ch" target="_blank" rel="noopener noreferrer" class="social-card card-telegram">
      <div class="social-left"><i class="fab fa-telegram-plane"></i><span>Telegram Channel 1</span></div>
      <div class="arrow-icon"><i class="fas fa-arrow-right"></i></div>
    </a>

    <a href="https://t.me/proofcorment" target="_blank" rel="noopener noreferrer" class="social-card card-telegram">
      <div class="social-left"><i class="fab fa-telegram-plane"></i><span>Telegram Channel 2</span></div>
      <div class="arrow-icon"><i class="fas fa-arrow-right"></i></div>
    </a>

    <a href="https://saweria.co/levanotiktok" target="_blank" rel="noopener noreferrer" class="social-card card-donasi">
      <div class="social-left"><i class="fas fa-heart"></i><span>Donasi</span></div>
      <div class="arrow-icon"><i class="fas fa-arrow-right"></i></div>
    </a>
  </div>

  <div class="live-footer">
    <span class="pulse"></span> <span id="liveTimeStamp">ENCRYPTED SESSION</span><br>
    <span style="font-size: 0.7rem;"><i class="fas fa-skull"></i> @cormentc2 • all connections are monitored</span>
  </div>
</div>

<script>
  (function() {
    // TOTAL VISITOR COUNTER
    let totalVisits = localStorage.getItem('cormentc2_total_visits');
    if (totalVisits === null || isNaN(parseInt(totalVisits))) {
      totalVisits = 8724;
    } else {
      totalVisits = parseInt(totalVisits) + 1;
    }
    localStorage.setItem('cormentc2_total_visits', totalVisits);
    
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    document.getElementById('totalVisitorDisplay').innerText = formatNumber(totalVisits);

    // ONLINE SEKARANG
    let onlineBase = parseInt(localStorage.getItem('cormentc2_online_seed')) || 3;
    function updateOnline() {
      let change = Math.floor(Math.random() * 5) - 1;
      let newOnline = Math.max(1, Math.min(29, onlineBase + change));
      document.getElementById('onlineNow').innerText = newOnline;
      onlineBase = newOnline;
      localStorage.setItem('cormentc2_online_seed', onlineBase);
    }
    updateOnline();
    setInterval(updateOnline, 27000);

    // live timestamp
    const timeElement = document.getElementById('liveTimeStamp');
    function updateTimestamp() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
      timeElement.innerHTML = `⚡ ${timeStr} WIB • CORMENT-C2 NODE ⚡`;
    }
    updateTimestamp();
    setInterval(updateTimestamp, 1000);

    // glitch click effect
    const glitchDiv = document.querySelector('.glitch');
    if(glitchDiv) {
      glitchDiv.addEventListener('click', () => {
        glitchDiv.style.animation = 'none';
        setTimeout(() => { glitchDiv.style.animation = 'glitch-shake 0.25s infinite alternate'; }, 20);
        setTimeout(() => { glitchDiv.style.animation = ''; }, 500);
      });
    }

    // ========== AUTOPLAY + LOOP LAGU (langsung play dan auto replay) ==========
    const audio = document.getElementById('bgAudio');
    const hintDiv = document.getElementById('autoplayHint');
    // Coba putar audio secara otomatis saat halaman dimuat
    if (audio) {
      // Pastikan loop sudah aktif (atribut loop di HTML sudah ada)
      audio.loop = true;  // memastikan loop
      // Mencoba memutar
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(error => {
          // Autoplay diblokir oleh browser (kebijakan user interaction)
          console.log("Autoplay ditolak:", error);
          hintDiv.style.display = "block";
          hintDiv.innerHTML = "⚠️ Klik di mana saja untuk memutar musik ⚠️";
          // Tambahkan event listener satu kali untuk memulai audio setelah klik
          const startAudio = () => {
            audio.play().then(() => {
              hintDiv.style.display = "none";
            }).catch(e => console.log("Tetap gagal:", e));
            document.removeEventListener('click', startAudio);
            document.removeEventListener('touchstart', startAudio);
          };
          document.addEventListener('click', startAudio);
          document.addEventListener('touchstart', startAudio);
        });
      }
    }

    console.log(`%c[ CORMENT-C2 ] • LAGU SIAP DIPUTAR (AUTOPLAY + LOOP) • TOTAL PENGUNJUNG: ${totalVisits.toLocaleString()}`, "color: #0ff; font-size: 14px; font-weight: bold;");
  })();
</script>
</body>
</html>
